project:
  name: "demand-forecast"
  seed: 42
  version: "0.1.0"

paths:
  data_raw: "data/raw/"
  data_processed: "data/processed/features.parquet"
  data_predictions: "data/predictions/"
  models: "models/"

data:
  target: "sales"
  date_col: "date"
  n_stores: 54
  n_families: 33
  n_series: 1782
  date_start: "2013-01-01"
  date_end: "2017-08-15"
  group_cols:
    - "store_nbr"
    - "family"
  categorical_cols:
    - "city"
    - "state"
    - "type"
    - "cluster"
    - "family"
    - "locale"
  family_segments:
    high_frequency_treshold: 0.30
    low_frequency_treshold: 0.50

model:
  horizon_diario: 7
  horizon_mensual: 30
  params_lgbm_diario:
    n_estimators: 1000
    learning_rate: 0.05
    num_leaves: 31
    max_bin: 63
    min_data_in_leaf: 100
    random_state: 42
    n_jobs: 2
    verbosity: -1
  params_lgbm_mensual:
    n_estimators: 800
    learning_rate: 0.05
    num_leaves: 31
    max_bin: 63
    min_data_in_leaf: 100
    random_state: 42
    n_jobs: 2
    verbosity: -1

features:
  holiday_impact:
    positive:
      - "Navidad"
      - "Dia de la Madre"
      - "Carnaval"
      - "Dia del Trabajo"
      - "Independencia de Cuenca"
      - "Fundacion de Quito"
      - "Mundial"
      - "Dia de Difuntos"
    negative:
      - "Primer dia del ano"
      - "Traslado"
      - "Black Friday"
      - "Cyber Monday"
      - "Puente"
      - "Recupero"
    atypical:
      - "Terremoto"

training:
  test_size_weeks: 8
  n_folds: 5

mlflow:
  experiment_name: "demand-forecast"
  tracking_uri: "https://dagshub.com/jorgesandovalpablo/demand-forecast.git"
